schema_version = 1
pack_id = "preen-rs.cleanup.base"
name = "Preen Cleanup Base"
version = "0.1.1"
description = "Official base capability pack for cleanup-focused Smart Care tasks on macOS and Linux."
author = "Preen Team"
license = "MIT"
homepage = "https://github.com/Preen-rs/preen-rulepack-cleanup"
core_compat = ">=0.1.0,<2.0.0"
action_api = 1
os_targets = ["Macos", "Linux"]
capabilities = ["FsRead", "FsTrash", "RunCommand"]

[signing]
sigstore = true
issuer = "https://token.actions.githubusercontent.com"
identity = "https://github.com/Preen-rs/preen-rulepack-cleanup/.github/workflows/release-manual.yml@refs/heads/main"

[[rules]]
id = "cleanup-cache-snapshot"
name = "Cache Snapshot"
rule_file = "rules/cleanup-cache-snapshot.toml"

[[rules]]
id = "cleanup-temp-preview"
name = "Temporary Files Preview"
rule_file = "rules/cleanup-temp-preview.toml"
