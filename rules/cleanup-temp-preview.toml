schema_version = 1
id = "cleanup-temp-preview"
name = "Temporary Files Preview"
category = "TemporaryFiles"
risk = "Low"
enabled = true

[match]
mode = "Paths"
paths = ["/tmp", "~/tmp"]
strategy = "Shallow"
command = []
parser = ""

[action]
action_type = "ScanPaths"
paths = ["/tmp", "~/tmp"]
command = []
mode = "Confirm"
timeout_sec = 30
allow_globs = false
max_items = 20000
package_manager = ""
project_types = []
params = { smart_care_capability = "cleanup", smart_care_review_hint = "Review temporary files before selecting cleanup" }
